spring.application.name=back-end

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Google OAuth2 ─────────────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Super Admin Seed ──────────────────────────────────────────────────────────
# Set this to your Google account email. On first boot the account is created
# (or promoted) to ADMIN. Team members set their own email here locally.
app.admin.email=${ADMIN_EMAIL:your-google-email@gmail.com}
app.admin.name=${ADMIN_NAME:Super Admin}

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000
